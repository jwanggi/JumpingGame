<!DOCTYPE html>
<html>
<head>
    <title>Jumping Game</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- This is the font returned from Google font -->
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@700&display=swap" rel="stylesheet">

    <style>
    /* Style to make the svg fit in the browser */
    body { padding: 0; margin: 0; }
    svg  { width: 100%; height: auto; }

    /* The container moves the text to the middle of the screen */
    #gameover-container {
        transform: translate(500px,200px);
        display: none;
    }
    #gameover {
        font-family: Dosis, sans-serif;
    }

    @keyframes cloud-animation {
        from { transform: translateX(1000px); }
        to   { transform: translateX(-120px); }
    }

    .cloud {
        animation-name: cloud-animation;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
        animation-duration: 10s;
    }

    /* Different delays for each cloud */
    #cloud1 { animation-delay: -5s; }
    #cloud2 { animation-delay: -10s; }


    @keyframes obstacle-animation {
        from { transform: translateX(1000px); }
        to   { transform: translateX(-70px); }
    }

    #obstacle {
        animation-name: none;
        animation-timing-function: linear;
        animation-iteration-count: 1; /* debug */
        animation-duration: 7s;
        display: none;
    }

    @keyframes player-animation {
        0%   { transform: translateY(0px); }
        50%  { transform: translateY(-50px); }
        100% { transform: translateY(0px); }
    }

    #player {
        animation-name: none;
        animation-timing-function: linear;
        animation-iteration-count: 1;
        animation-duration: 0.8s;
    }

    @keyframes rotate {
        from { transform: translate(50%, 50%) rotate(0deg) scale(0);  opacity: 0}
        to { transform: translate(50%, 50%) rotate(360deg) scale(1);  opacity: 1}
    }

    .rotate {
        animation: rotate 1.5s ease forwards;
    }
    </style>

    <script>
    // Check whether the game is over if the player is near the obstacle
    function checkGameover() {

        // You need to keep on checking for the gameover situation here

        // Read the transform property
        let playerTransform = $('#player').css("transform");
        let obstacleTransform = $('#obstacle').css("transform");

        if (obstacleTransform !== 'none'){
            
            // Extract the appropriate numbers of obstacle
            let obstacleValues = obstacleTransform.match(/matrix\(([^)]+)\)/);

            let obstacleNums = obstacleValues[1].split(',').map(Number); 
            let obstacleX = obstacleNums[4];

            //console.log("obstacleX: ",obstacleX);

            // Compare the numbers for the gameover situation

            // Check if the player is on the ground
            let isPlayerNearGround = (playerTransform === 'none');

            if(playerTransform !== 'none'){

                // Extract the appropriate numbers of player
                let playerValues = playerTransform.match(/matrix\(([^)]+)\)/);

                let playerNums = playerValues[1].split(',').map(Number); 
                let playerY = playerNums[5];

                //console.log("playerY: ",playerY);

                isPlayerNearGround = playerY >=0;
            }

            // Check if the obstacle is under the player
            let isObstacleUnderPlayer = obstacleX < 110 && obstacleX > 40;

            // Check if game over conditions are met
            if (isPlayerNearGround && isObstacleUnderPlayer) {
                // Stop all animations
                document.getElementById("player").style.animationPlayState = "paused";
                document.getElementById("obstacle").style.animationPlayState = "paused";
                document.getElementById("cloud1").style.animationPlayState = "paused";
                document.getElementById("cloud2").style.animationPlayState = "paused";

                // Show the game over text with animation
                $('#gameover-container').show();
                $('#gameover-container').addClass('rotate');

                return; // Exit to stop further checks
            }
        }

        // Request to check again
        setTimeout(checkGameover, 10);
    }

    // Make an obstacle by starting the obstacle animation
    function makeObstacle() {

        // You need to show the obstacle and start the animation here
        let obstacle = document.getElementById("obstacle");

        // Show the obstacle by changing its display property
        obstacle.style.display = "inline"; 

        // Start the animation by setting the animation-name
        obstacle.style.animationName = "obstacle-animation";

    }

    // Make the player jump by starting the player animation
    function jump() {

        // You need to start the player jumping animation here
        const player = document.getElementById("player");

        // Start the animation by setting the animation-name
        player.style.animationName = "player-animation";

    }

    $(function () {
        // Handle the spacebar key for controlling the player
        $(document).on("keydown", function(e) {
            // The player jumps if the spacebar key is down
            if (e.keyCode == 32)
                jump();
        });

        // The obstacle animation has finished
        $("#obstacle").on("animationend", function() {

            // You need to hide the obstacle and stop the animation here

            // Hide the obstacle
            $(this).hide();

            // Stop the animation
            this.style.animationName = "none";

            // You will make another obstacle later

            // Increase speed by reducing animation duration
            let currentDuration = parseFloat($('#obstacle').css("animation-duration")); // Convert to a number
            //console.log("currentDuration = ",currentDuration);
            const newDuration = Math.max(0.5, currentDuration - 1); // Ensure it doesn't go below 0.5 seconds
            this.style.animationDuration = newDuration + "s"; // Set the new duration

            // Make a new obstacle after a random time
            let RamTime = Math.random() * 2000;
            //console.log("RamTime = ", RamTime);
            setTimeout(makeObstacle, RamTime);

        });

        // The player animation has finished
        $("#player").on("animationend", function() {

            // You need to stop the animation here
            this.style.animationName = "none";

        });

        // Start the obstacle animation
        setTimeout(makeObstacle, Math.random() * 2000);

        // Start the game over checking
        setTimeout(checkGameover, 100);
    });
    </script>
</head>
